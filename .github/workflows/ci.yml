name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Run every JavaScript-based action on Node 24. The runner is phasing out Node 20
# (some actions still declare node20); this forces the newer runtime everywhere and
# drops the "Node 20 is being deprecated" warnings.
env:
  ACTIONS_RUNNER_FORCE_ACTIONS_NODE_VERSION: node24

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-wrapper:
    name: Validate Gradle wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: gradle/actions/wrapper-validation@v5

  build:
    name: Build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build, test, lint (ktlint + detekt) and verify public API
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports-jdk-${{ matrix.java }}
          path: |
            **/build/reports/
            **/build/test-results/
          retention-days: 7

  qdrant-compat:
    name: Integration (${{ matrix.qdrant }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        qdrant:
          - "qdrant/qdrant:v1.18.2"
          - "qdrant/qdrant:latest"
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Integration tests against ${{ matrix.qdrant }}
        env:
          QDRANT_IMAGE: ${{ matrix.qdrant }}
        run: ./gradlew :kdrant-transport-rest:test --tests "*IntegrationTest*" --no-daemon --stacktrace

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Advisory: the action needs the repo's Dependency graph enabled
      # (Settings → Security & analysis). Until then it can't run, so don't block the PR on it.
      - uses: actions/dependency-review-action@v4
        continue-on-error: true
